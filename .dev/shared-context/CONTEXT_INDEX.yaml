# Context Index — Quick Reference for Agent Cold Start
# อ่านไฟล์นี้เพื่อรู้ว่าต้องอ่านอะไรบ้างก่อนเริ่มงาน

version: "1.0.0"
updated: "2026-03-28"

# ── Always Read (ทุก session) ────────────────────────
always_read:
  - path: CLAUDE.md
    purpose: Project rules (auto-loaded by Claude Code)
  - path: .dev/shared-context/GOAL.md
    purpose: Current objectives and phase status
  - path: .dev/shared-context/MEMORY.md
    purpose: Agent progress log and handover notes
  - path: CHANGELOG.md
    purpose: Latest version and recent changes

# ── Read When Needed ────────────────────────────────
domain_context:
  architecture:
    - docs/zuri/RESTRUCTURE_PLAN.md
    - docs/gotchas/README.md
  inbox:
    - docs/product/features/INBOX.md     # ยังไม่มี — Phase 1
    - docs/gotchas/webhook-serverless.md
    - docs/gotchas/database-identity.md
  marketing:
    - docs/product/features/ADS.md       # ยังไม่มี — Phase 1
    - docs/gotchas/meta-api.md
    - docs/gotchas/marketing-attribution.md
  pos:
    - docs/product/features/POS.md       # ยังไม่มี — Phase 1
    - docs/gotchas/database-identity.md  # dbId vs id
  kitchen:
    - docs/product/features/KITCHEN.md   # ยังไม่มี — Phase 1
    - docs/gotchas/database-identity.md  # FEFO, stock deduction
  dsb:
    - docs/product/features/DSB.md       # ยังไม่มี — Phase 1
    - docs/gotchas/ai-agent.md
  multi_tenant:
    - docs/gotchas/multi-tenant.md
  ai:
    - docs/gotchas/ai-agent.md

# ── Config SSOT ─────────────────────────────────────
config_ssot:
  - system_config.yaml        # roles, VAT, statuses, tiers
  - id_standards.yaml          # ID format specs
  - system_requirements.yaml   # functional requirements

# ── Schema ──────────────────────────────────────────
schema:
  - prisma/schema.prisma       # DB models (single source of truth)

# ── Dev Tooling ─────────────────────────────────────
dev_tools:
  - .dev/README.md
  - .dev/orchestrator/SPEC.md
  - .dev/agents/AGENT_PROTOCOL.md
