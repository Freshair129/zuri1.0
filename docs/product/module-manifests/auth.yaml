# Module Manifest — auth
# Zuri Platform v2.3

module:
  name: auth
  group: shared
  description: "Authentication & RBAC — NextAuth.js v4, JWT, bcrypt, 12+1 roles, permission matrix"
  spec: none  # covered in tech-spec.md and system_config.yaml
  status: scaffold

owns:
  models:
    - Employee
  repositories:
    - employeeRepo.js
  api_routes:
    - POST /api/auth/[...nextauth] — NextAuth handler (login, session, JWT)
    - GET /api/employees — employee list
    - POST /api/employees — create employee
    - PATCH /api/employees/[id] — update employee (roles, profile)
    - GET /api/employees/[id] — employee detail
  workers: []
  pages:
    - /login — authentication page
    - /employees — employee management
  components:
    - LoginForm.js — login form with credentials
    - EmployeeTable.js — employee list with role badges
    - RoleSelector.js — multi-role assignment UI
  hooks:
    - useSession.js  # re-export from next-auth/react

depends_on: []

public_api:
  repos:
    - getEmployeeById(tenantId, employeeId) — fetch single employee with roles
    - getEmployeeByEmail(tenantId, email) — used by NextAuth credentials provider
    - listEmployees(tenantId, filters) — paginated employee list
    - createEmployee(tenantId, data) — create employee with hashed password
    - updateEmployee(tenantId, employeeId, data) — update profile / roles
  events:
    - employee-updated — Pusher: broadcasted when roles or profile change
  constants:
    - ROLES  # sourced from system_config.yaml (DEV, TEC, MGR, MKT, HR, PUR, PD, ADM, ACC, SLS, AGT, STF, OWNER)

libs:
  - src/lib/permissionMatrix.js — can(roles, domain, action)
  - src/lib/rbac.js — role hierarchy + validation
  - src/middleware.js — tenant resolution + auth guard

public_functions:
  - can(roles, domain, action) — RBAC permission check
  - getSession() — server-side session retrieval
  - session.user — { employeeId, roles, tenantId }
