# ─────────────────────────────────────────────────────────
# NON-FUNCTIONAL REQUIREMENTS
# ─────────────────────────────────────────────────────────

non_functional_requirements:

  - category: "Performance & Latency"
    requirements:
      - name: "NFR1 — Webhook Latency"
        description: "Webhook ตอบ Facebook < 200ms เสมอ — processEvent() fire-and-forget"
        endpoint: "/api/webhooks/facebook"
        status: "✅ Enforced"

      - name: "NFR2 — Dashboard API Latency"
        description: "Dashboard API < 500ms — Redis cache (ADR-034)"
        status: "✅ Enforced"

  - category: "Reliability & Integrity"
    requirements:
      - name: "NFR3 — BullMQ Retry"
        description: "BullMQ retry ≥ 5 ครั้ง, exponential backoff"
        status: "✅ Enforced"

      - name: "NFR4 — Webhook Signature Validation"
        description: "X-Hub-Signature-256 verify ทุก Facebook request"
        status: "✅ Enforced"

      - name: "NFR5 — Identity Upsert Transaction"
        description: "Identity upsert ต้องอยู่ใน prisma.$transaction เสมอ"
        status: "✅ Enforced"

      - name: "NFR6 — Race Condition Guard"
        description: |
          FB Webhook: findFirst → create ต้องครอบด้วย try-catch P2002
          ถ้า P2002 → retry findFirst เพื่อ recover
        status: "✅ Enforced (v0.18.0)"

  - category: "Code Quality"
    requirements:
      - name: "Error Logging"
        description: "ห้าม catch(e) {} เงียบ — ต้อง log ทุกครั้ง"
        format: "console.error('[ModuleName] message', error)"

      - name: "Repository Pattern"
        description: "ทุก DB operation ต้องผ่าน src/lib/repositories/ เท่านั้น"

      - name: "Icon Standard (ADR-031)"
        description: "ใช้ Lucide React เท่านั้น — ห้าม FontAwesome"

  - category: "Data Integrity Rules"
    rules:
      - name: "Aggregation Checksum"
        logic: "Sum(Ads.Metrics) == Campaign.Metrics"
        description: "ตรวจ data gap จาก Meta sync"

      - name: "Hourly Sync Continuity"
        logic: "Next_Sync_Hour == Current_Sync_Hour + 1"

      - name: "Differential Delta Rule"
        logic: "Delta = Current_Total - Previous_Total; if Delta == 0 → skip write"

  - category: "Reporting Calculation Formulas"
    formulas:
      - name: "ROAS"
        logic: "Total Revenue / Total Spend"
      - name: "CPA"
        logic: "Total Spend / Total Transactions"
      - name: "CON (Conversion Efficiency)"
        logic: "Total Transactions / Cost Per Result (CPR)"

  - category: "Multi-Tenancy & Isolation"
    requirements:
      - name: "NFR7 — Tenant Data Isolation"
        description: "Zero cross-tenant leak — tenantId mandatory in all repository calls and WHERE clauses."
        status: "✅ Enforced"

      - name: "NFR8 — Tenant Branding Separation"
        description: "UI components must use TenantProvider for all branding (logo, colors, names). No hardcoding per tenant."
        status: "✅ Enforced"

# ─────────────────────────────────────────────────────────
# API SPECIFICATION (RESTful — Next.js App Router)
# ─────────────────────────────────────────────────────────

api_specification:

  - module: "Auth"
    endpoints:
      - method: "GET/POST"
        path: "/api/auth/[...nextauth]"
        purpose: "NextAuth session management (CredentialsOnly)"
      - method: "GET"
        path: "/api/agent/me"
        purpose: "ดึงข้อมูลพนักงานที่ login อยู่"

  - module: "Webhooks"
    endpoints:
      - method: "GET/POST"
        path: "/api/webhooks/facebook"
        purpose: "Facebook Messenger webhook — verify + receive events"
      - method: "POST"
        path: "/api/webhooks/line"
        purpose: "LINE Messaging API webhook"

  - module: "Marketing"
    endpoints:
      - method: "GET"
        path: "/api/marketing/campaigns"
        purpose: "List campaigns from DB"
      - method: "GET"
        path: "/api/marketing/adsets"
        purpose: "List ad sets from DB"
      - method: "GET"
        path: "/api/marketing/ads"
        purpose: "List ads from DB"
      - method: "GET"
        path: "/api/marketing/daily"
        purpose: "Daily metrics aggregated"
      - method: "POST"
        path: "/api/marketing/sync-hourly"
        purpose: "Trigger hourly sync from Meta Graph API"
      - method: "GET"
        path: "/api/marketing/chat/conversations"
        purpose: "Paginated conversation list (cursor-based)"
      - method: "GET"
        path: "/api/marketing/chat/messages"
        purpose: "Messages by conversation_id"

  - module: "Inbox"
    endpoints:
      - method: "GET"
        path: "/api/inbox/conversations"
        purpose: "Unified FB+LINE inbox (enriched customer data)"
      - method: "GET/POST"
        path: "/api/inbox/conversations/[id]/messages"
        purpose: "Paginated messages + reply"

  - module: "Customers"
    endpoints:
      - method: "GET/POST"
        path: "/api/customers"
        purpose: "List + create customers"
      - method: "GET/PATCH"
        path: "/api/customers/[id]"
        purpose: "Customer detail + update (with profile & audit logging)"
      - method: "GET"
        path: "/api/customers/[id]/activity"
        purpose: "Customer-specific activity log timeline"


  - module: "Enrollments"
    endpoints:
      - method: "GET/POST"
        path: "/api/enrollments"
        purpose: "List + create enrollments"
      - method: "GET/PATCH"
        path: "/api/enrollments/[id]"
        purpose: "Detail + add hours"

  - module: "Schedules"
    endpoints:
      - method: "GET/POST"
        path: "/api/schedules"
        purpose: "List (upcoming/days) + create schedule"
      - method: "GET/PATCH"
        path: "/api/schedules/[id]"
        purpose: "Detail + update"
      - method: "POST"
        path: "/api/schedules/[id]/complete"
        purpose: "Complete session + real-time stock deduction"

  - module: "Kitchen"
    endpoints:
      - method: "GET/POST"
        path: "/api/kitchen/ingredients"
        purpose: "List (lowStockOnly filter) + create ingredient"
      - method: "PATCH"
        path: "/api/kitchen/ingredients/[id]"
        purpose: "Update ingredient / stock"
      - method: "GET/POST"
        path: "/api/kitchen/purchase"
        purpose: "List + create purchase requests"
      - method: "PATCH"
        path: "/api/kitchen/purchase/[id]"
        purpose: "Update PR status"

  - module: "Assets"
    endpoints:
      - method: "GET/POST"
        path: "/api/assets"
        purpose: "List (category/status/search) + create"
      - method: "GET/PATCH"
        path: "/api/assets/[id]"
        purpose: "Detail + update"

  - module: "Recipes"
    endpoints:
      - method: "GET/POST"
        path: "/api/recipes"
        purpose: "List + create recipes"
      - method: "GET/PATCH"
        path: "/api/recipes/[id]"
        purpose: "Detail + update"

  - module: "Packages"
    endpoints:
      - method: "GET/POST"
        path: "/api/packages"
        purpose: "List + create packages"
      - method: "GET/PATCH"
        path: "/api/packages/[id]"
        purpose: "Detail + update"
      - method: "POST"
        path: "/api/packages/[id]/swap"
        purpose: "Swap course in enrollment (1 ครั้ง, 409 ถ้าใช้แล้ว)"
      - method: "GET/POST"
        path: "/api/packages/enrollments"
        purpose: "List by customerId + create package enrollment"

  - module: "Notifications"
    endpoints:
      - method: "GET/POST"
        path: "/api/notifications/rules"
        purpose: "List + create/upsert notification rules"
      - method: "DELETE"
        path: "/api/notifications/rules/[id]"
        purpose: "Delete rule by UUID or ruleId"

  - module: "Payments"
    endpoints:
      - method: "GET"
        path: "/api/payments/pending"
        purpose: "List pending slips รอ employee verify"
      - method: "PATCH"
        path: "/api/payments/verify/[id]"
        purpose: "Verify slip → slipStatus=VERIFIED + Order CLOSED"

  - module: "Kitchen Lots"
    endpoints:
      - method: "GET/POST"
        path: "/api/kitchen/lots"
        purpose: "List lots (filter: status, ingredientId, expiring=30) + create lot"
      - method: "GET/PATCH"
        path: "/api/kitchen/lots/[id]"
        purpose: "Lot detail + update status/remainingQty"

  - module: "QStash Worker"
    endpoints:
      - method: "POST"
        path: "/api/workers/notification"
        purpose: "Upstash QStash serverless worker — verify signature + LINE push"
        note: "ห้ามเรียกตรง ต้องผ่าน QStash เท่านั้น (signature required)"

  - module: "Tenant"
    endpoints:
      - method: "GET"
        path: "/api/tenant/config"
        purpose: "Fetch tenant branding (logo, name, colors) for dynamic UI"


  - module: "Sheets Sync"
    endpoints:
      - method: "POST"
        path: "/api/sheets/sync-master-data"
        purpose: "Sync courses/ingredients/BOM/assets from Google Sheets CSV"

